<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMOD Config Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Segoe UI", Arial, sans-serif;
  background: #0d0d0d;
  color: #bbb;
  padding: 30px 20px;
  max-width: 620px;
  margin: 0 auto;
}
h1 {
  font-size: 1.6rem;
  font-weight: 400;
  color: #e67e22;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.sub { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.15s;
}
label:hover { background: #151515; }
input[type=checkbox] {
  width: 16px; height: 16px;
  accent-color: #e67e22;
  flex-shrink: 0;
}
.name { min-width: 140px; color: #ddd; }
code {
  font-size: 0.8rem;
  color: #666;
  background: #111;
  padding: 1px 6px;
  border-radius: 2px;
}
.val {
  margin-left: auto;
  color: #555;
  font-size: 0.8rem;
  font-family: monospace;
}
.warn { color: #c0392b; font-size: 0.8rem; }
.sum {
  margin-top: 20px;
  padding: 14px 16px;
  background: #111;
  border-left: 3px solid #e67e22;
  font-size: 1.1rem;
  color: #ccc;
}
.sum span { color: #e67e22; font-weight: bold; }
pre {
  margin-top: 10px;
  padding: 12px;
  background: #0a0a0a;
  border: 1px solid #1a1a1a;
  border-radius: 3px;
  font-size: 0.85rem;
  color: #e67e22;
  overflow-x: auto;
}
.cpy {
  margin-top: 10px;
  padding: 8px 20px;
  background: #e67e22;
  color: #fff;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  font-size: 0.9rem;
}
.cpy:hover { background: #d35400; }
.auto { color: #888; font-style: italic; font-size: 0.82rem; }
</style>
</head>
<body>
<h1>SMOD Config Calculator</h1>
<div class="sub">Movie Battles II &mdash; select permissions to calculate admin config value</div>
<div id="perms"></div>
<div class="auto">Say, Smsay, Status, Who &mdash; granted automatically</div>
<div class="sum">Config Value: <span id="total">0</span></div>
<pre id="output">seta g_smodConfig_1 "0"</pre>
<button class="cpy" onclick="copy()">Copy to clipboard</button>

<script>
const perms = [
  [1,    "Kick",          "smod kick &lt;name/ID&gt;"],
  [2,    "Nextmap",       "Changes to next map"],
  [4,    "Map",           "map &lt;mapname&gt;"],
  [8,    "Maprestart",    "Restart map or round"],
  [16,   "Gametype",      "", "warn"],
  [32,   "MBMode",        "smod mbmode &lt;0-4&gt;"],
  [64,   "Ban",           "smod ban &lt;name/ID&gt;"],
  [128,  "Tempban",       "smod tempban &lt;name/ID&gt; &lt;rounds&gt;"],
  [256,  "Forceteam",     "smod forceteam &lt;name/ID&gt; red/blue/spec"],
  [512,  "VSTR",          "smod vstr &lt;name&gt;"],
  [1024, "Campaign",      "Campaign file commands"],
  [2048, "Poll",          "smod poll &lt;question&gt;"],
  [4096, "RemoveBan",     "smod removeban &lt;ip/mask&gt;"],
  [8192, "Shuffle",       "Shuffle teams next round"],
  [16384,"Mute / Unmute", "smod mute &lt;name/ID&gt; &lt;minutes&gt;"],
  [32768,"SetTK",         "smod settk &lt;name/ID&gt; &lt;points&gt;"],
];
const container = document.getElementById("perms");
perms.forEach(([val, name, desc, cls]) => {
  var extra = cls ? ' <span class="warn">Do not use</span>' : "";
  var html = '<input type="checkbox" value="' + val + '" onchange="calc()">';
  html += '<span class="name">' + name + '</span>';
  html += desc ? '<code>' + desc + '</code>' : "";
  html += extra;
  html += '<span class="val">+' + val + '</span>';
  var lbl = document.createElement("label");
  lbl.innerHTML = html;
  container.appendChild(lbl);
});
function calc() {
  var total = 0;
  var cbs = document.querySelectorAll("#perms input:checked");
  for (var i = 0; i < cbs.length; i++) total += parseInt(cbs[i].value);
  document.getElementById("total").textContent = total;
  document.getElementById("output").textContent = 'seta g_smodConfig_1 "' + total + '"';
}
function copy() {
  navigator.clipboard.writeText(document.getElementById("output").textContent);
}
calc();
</script>
</body>
</html>
