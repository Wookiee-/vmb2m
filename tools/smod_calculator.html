<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMOD Config Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #060606;
  color: #aaa;
  padding: 30px 20px;
  max-width: 640px;
  margin: 0 auto;
}
h1 {
  font-size: 1.5rem;
  font-weight: 600;
  color: #d48c33;
  margin-bottom: 4px;
}
.sub { color: #555; font-size: 0.85rem; margin-bottom: 20px; border-bottom: 1px solid #111; padding-bottom: 12px; }
label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 10px;
  border-radius: 2px;
  cursor: pointer;
}
label:hover { background: #0d0d0d; }
input[type=checkbox] {
  width: 15px; height: 15px;
  accent-color: #d48c33;
  flex-shrink: 0;
}
.name { min-width: 135px; color: #fff; font-size: 0.92rem; }
code {
  font-size: 0.78rem;
  color: #666;
  background: #0a0a0a;
  padding: 1px 5px;
  border-radius: 2px;
}
.val {
  margin-left: auto;
  color: #555;
  font-size: 0.8rem;
  font-family: monospace;
}
.warn { color: #c0392b; font-size: 0.8rem; margin-left: 4px; }
.sum {
  margin-top: 20px;
  padding: 14px 16px;
  background: #0a0a0a;
  border-left: 3px solid #d48c33;
  font-size: 1.1rem;
  color: #ccc;
  border-radius: 1px;
}
.sum span { color: #d48c33; font-weight: bold; }
pre {
  margin-top: 10px;
  padding: 12px;
  background: #000;
  border: 1px solid #151515;
  font-size: 0.85rem;
  color: #d48c33;
  overflow-x: auto;
  border-radius: 1px;
}
.cpy {
  margin-top: 10px;
  padding: 8px 22px;
  background: #d48c33;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 0.9rem;
  border-radius: 2px;
}
.cpy:hover { background: #b8732a; }
.auto { color: #555; font-size: 0.82rem; margin-top: 14px; font-style: italic; }
</style>
</head>
<body>
<h1>SMOD Config Calculator</h1>
<div class="sub">Movie Battles II &mdash; select permissions to calculate the admin config value</div>
<div id="perms"></div>
<div class="auto">Say, Smsay, Status, Who &mdash; granted automatically</div>
<div class="sum">Config Value: <span id="total">0</span></div>
<pre id="output">seta g_smodConfig_1 "0"</pre>
<button class="cpy" onclick="copy()">Copy to clipboard</button>

<script>
var perms = [
  [1,    "Kick",          "smod kick &lt;name/ID&gt;"],
  [2,    "Nextmap",       "Changes to next map"],
  [4,    "Map",           "map &lt;mapname&gt;"],
  [8,    "Maprestart",    "Restart map or round"],
  [16,   "Gametype",      "", "warn"],
  [32,   "MBMode",        "smod mbmode &lt;0-4&gt;"],
  [64,   "Ban",           "smod ban &lt;name/ID&gt;"],
  [128,  "Tempban",       "smod tempban &lt;name/ID&gt; &lt;rounds&gt;"],
  [256,  "Forceteam",     "smod forceteam &lt;name/ID&gt; red/blue/spec"],
  [512,  "VSTR",          "smod vstr &lt;name&gt;"],
  [1024, "Campaign",      "Campaign file commands"],
  [2048, "Poll",          "smod poll &lt;question&gt;"],
  [4096, "RemoveBan",     "smod removeban &lt;ip/mask&gt;"],
  [8192, "Shuffle",       "Shuffle teams next round"],
  [16384,"Mute / Unmute", "smod mute &lt;name/ID&gt; &lt;minutes&gt;"],
  [32768,"SetTK",         "smod settk &lt;name/ID&gt; &lt;points&gt;"],
];
var c = document.getElementById("perms");
for (var i = 0; i < perms.length; i++) {
  var p = perms[i];
  var extra = p[3] ? ' <span class="warn">Do not use</span>' : "";
  var lbl = document.createElement("label");
  lbl.innerHTML = '<input type="checkbox" value="' + p[0] + '" onchange="calc()">'
    + '<span class="name">' + p[1] + '</span>'
    + (p[2] ? '<code>' + p[2] + '</code>' : "")
    + extra
    + '<span class="val">+' + p[0] + '</span>';
  c.appendChild(lbl);
}
function calc() {
  var total = 0, cbs = document.querySelectorAll("#perms input:checked");
  for (var i = 0; i < cbs.length; i++) total += parseInt(cbs[i].value);
  document.getElementById("total").textContent = total;
  document.getElementById("output").textContent = 'seta g_smodConfig_1 "' + total + '"';
}
function copy() {
  navigator.clipboard.writeText(document.getElementById("output").textContent);
}
calc();
</script>
</body>
</html>
