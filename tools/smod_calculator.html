<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMOD Config Calculator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  background: #19212b;
  color: #bfd0e0;
  padding: 30px 20px;
  max-width: 640px;
  margin: 0 auto;
  font-size: 16px;
}
h1 {
  font-size: 1.6rem;
  font-weight: 600;
  color: #bfd0e0;
  margin-bottom: 4px;
}
.sub { color: #bfd0e0; font-size: 0.92rem; margin-bottom: 20px; border-bottom: 1px solid #2c3b4f; padding-bottom: 12px; }
label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 15px;
}
label:hover { background: #1e2834; }
input[type=checkbox] {
  width: 16px; height: 16px;
  accent-color: #1979a5;
  flex-shrink: 0;
}
.name { min-width: 140px; color: #bfd0e0; font-size: 15px; }
code {
  font-size: 13px;
  color: #bfd0e0;
  background: #10151b;
  padding: 1px 6px;
  border-radius: 2px;
}
.val {
  margin-left: auto;
  color: #ffffff;
  font-size: 13px;
  font-family: monospace;
}
.warn { color: #c0392b; font-size: 13px; margin-left: 4px; }
.sum {
  margin-top: 20px;
  padding: 14px 16px;
  background: #10151b;
  border-left: 3px solid #1979a5;
  font-size: 1.2rem;
  color: #bfd0e0;
  border-radius: 1px;
}
.sum span { color: #1979a5; font-weight: bold; font-size: 1.2rem; }
pre {
  margin-top: 10px;
  padding: 12px;
  background: #0d1117;
  border: 1px solid #2c3b4f;
  font-size: 14px;
  color: #1979a5;
  overflow-x: auto;
  border-radius: 1px;
}
.cpy {
  margin-top: 10px;
  padding: 8px 22px;
  background: #1979a5;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 15px;
  border-radius: 2px;
}
.cpy:hover { background: #1f99d1; }
.auto { color: #bfd0e0; font-size: 13px; margin-top: 14px; font-style: italic; }
</style>
</head>
<body>
<h1>SMOD Config Calculator</h1>
<div class="sub">Movie Battles II &mdash; select permissions to calculate the admin config value</div>
<div id="perms"></div>
<div class="auto">Say, Smsay, Status, Who &mdash; granted automatically</div>
<div class="sum">Config Value: <span id="total">0</span></div>
<pre id="output">seta g_smodConfig_1 "0"</pre>
<button class="cpy" onclick="copy()">Copy to clipboard</button>

<script>
var perms = [
  [1,    "Kick",          "smod kick &lt;name/ID&gt;"],
  [2,    "Nextmap",       "Changes to next map"],
  [4,    "Map",           "map &lt;mapname&gt;"],
  [8,    "Maprestart",    "Restart map or round"],
  [16,   "Gametype",      "", "warn"],
  [32,   "MBMode",        "smod mbmode &lt;0-4&gt;"],
  [64,   "Ban",           "smod ban &lt;name/ID&gt;"],
  [128,  "Tempban",       "smod tempban &lt;name/ID&gt; &lt;rounds&gt;"],
  [256,  "Forceteam",     "smod forceteam &lt;name/ID&gt; red/blue/spec"],
  [512,  "VSTR",          "smod vstr &lt;name&gt;"],
  [1024, "Campaign",      "Campaign file commands"],
  [2048, "Poll",          "smod poll &lt;question&gt;"],
  [4096, "RemoveBan",     "smod removeban &lt;ip/mask&gt;"],
  [8192, "Shuffle",       "Shuffle teams next round"],
  [16384,"Mute / Unmute", "smod mute &lt;name/ID&gt; &lt;minutes&gt;"],
  [32768,"SetTK",         "smod settk &lt;name/ID&gt; &lt;points&gt;"],
];
var c = document.getElementById("perms");
for (var i = 0; i < perms.length; i++) {
  var p = perms[i];
  var extra = p[3] ? ' <span class="warn">Do not use</span>' : "";
  var lbl = document.createElement("label");
  lbl.innerHTML = '<input type="checkbox" value="' + p[0] + '" onchange="calc()">'
    + '<span class="name">' + p[1] + '</span>'
    + (p[2] ? '<code>' + p[2] + '</code>' : "")
    + extra
    + '<span class="val">+' + p[0] + '</span>';
  c.appendChild(lbl);
}
function calc() {
  var total = 0, cbs = document.querySelectorAll("#perms input:checked");
  for (var i = 0; i < cbs.length; i++) total += parseInt(cbs[i].value);
  document.getElementById("total").textContent = total;
  document.getElementById("output").textContent = 'seta g_smodConfig_1 "' + total + '"';
}
function copy() {
  navigator.clipboard.writeText(document.getElementById("output").textContent);
}
calc();
</script>
</body>
</html>
